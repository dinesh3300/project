name: Comprehensive QA & Automated Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android-build-and-test:
    name: Android Build & Unit Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Android Unit Tests
        run: ./gradlew test --stacktrace

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Compiled Android Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurocheck-android-debug-apk
          path: app/build/outputs/apk/debug/

      - name: Upload Android Unit Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-reports
          path: app/build/reports/tests/test/

  selenium-e2e-tests:
    name: Run Selenium E2E Web Automation Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Chrome Browser
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Web Frontend Dependencies
        run: |
          cd web
          npm install

      - name: Start Web Application Server
        run: |
          cd web
          npm run dev &
          npx wait-on http://localhost:5173 --timeout 60000

      - name: Install Selenium Test Runner Dependencies
        run: |
          cd web/selenium-tests
          npm install

      - name: Execute Automated Selenium E2E Tests
        env:
          CI: 'true'
          HEADLESS: 'true'
          TEST_URL: 'http://localhost:5173'
        run: |
          cd web/selenium-tests
          npm test

      - name: Upload Selenium Test Reports & QA Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-reports
          path: |
            web/selenium-tests/NeuroCheck_E2E_Test_Cases_Summary_and_Details.xlsx
            QA_Documentation/NeuroCheck_E2E_Test_Cases_Summary_and_Details.xlsx

  web-build-and-lint:
    name: Web Frontend Build & Lint Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Web Dependencies
        run: |
          cd web
          npm install

      - name: Build Web Application
        run: |
          cd web
          npm run build

  backend-api-diagnostics:
    name: Backend API & AI Python Script Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP Backend Files
        run: |
          for file in backend/*.php; do
            if [ -f "$file" ]; then
              php -l "$file" || exit 1
            fi
          done

      - name: Verify Python AI Inference Script
        run: |
          python -m py_compile backend/inference.py

      - name: Upload QA Test Documents
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-documentation-excel-reports
          path: QA_Documentation/
